{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Academy — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'DM Sans', sans-serif; box-sizing: border-box; }

        body {
            background: #ffffff;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .logo-img { width: 220px; height: 220px; object-fit: contain; }

        .logo-text {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: #4a8c2a;
            margin-top: 4px;
            text-align: center;
        }

        .page-title {
            font-family: 'Merriweather', serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e6b17;
            text-align: center;
            margin: 20px 0 24px 0;
        }

        .card {
            background: #ffffff;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            padding: 28px 32px 32px 32px;
            width: 100%;
            max-width: 420px;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #1e6b17;
            margin-bottom: 20px;
        }

        .input-single-wrapper {
            border: 1.5px solid #d1d5db;
            border-radius: 6px;
            display: flex;
            align-items: center;
            background: #fff;
            margin-bottom: 14px;
        }

        .input-single-wrapper:focus-within { border-color: #2d7a22; }

        .input-single-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            padding: 13px 14px;
            font-size: 14px;
            color: #374151;
            background: transparent;
        }

        .input-single-wrapper input::placeholder { color: #9ca3af; }

        .input-single-wrapper .icon {
            padding-right: 14px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .btn-siguiente {
            display: block;
            margin: 0 auto 16px auto;
            background: #1a5c14;
            color: white;
            font-weight: 600;
            font-size: 15px;
            padding: 11px 48px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-siguiente:hover { background: #145010; transform: translateY(-1px); }

        .divider {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 auto;
            background: #1a5c14;
            color: white;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 24px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-google:hover {
            background: #145010;
        }

        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 9px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 14px;
        }

        .link-text {
            text-align: center;
            font-size: 13px;
            color: #6b7280;
            margin-top: 20px;
        }

        .link-text a { color: #1e6b17; font-weight: 600; text-decoration: none; }
        .link-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:4px;">
        <img src="{% static 'img/MyAcademyWitheLogo.png' %}" alt="My Academy" class="logo-img">
        <div class="logo-text">MY ACADEMY</div>
    </div>

    <!-- Título -->
    <h1 class="page-title">Bienvenido a My Academy</h1>

    <!-- Card -->
    <div class="card">
        <div class="card-title">Iniciar Sesion</div>

        {% if messages %}
            {% for message in messages %}
                <div class="error-msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <!-- Correo -->
            <div class="input-single-wrapper">
                <input type="text" name="username" placeholder="Correro Electronico" required autocomplete="username">
                <span class="icon">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
                    </svg>
                </span>
            </div>

            <!-- Contraseña — con espacio arriba igual al Figma -->
            <div class="input-single-wrapper" style="margin-top:6px;">
                <input type="password" name="password" id="passwordField" placeholder="Contraseña" required autocomplete="current-password">
                <span class="icon" onclick="togglePassword()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
                    </svg>
                </span>
            </div>

            <div style="margin-top:20px;">
                <button type="submit" class="btn-siguiente">Siguiente</button>
            </div>

            <div class="divider">O</div>

            <a href="{% provider_login_url 'google' %}" class="btn-google">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Inicia con Google
            </a>

        </form>

        <div class="link-text">
            ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const f = document.getElementById('passwordField');
            f.type = f.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
